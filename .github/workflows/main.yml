name: Remote Desktop Windows
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
      - name: Create or Update User Account
        run: |
          $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          if (Get-LocalUser -Name "runneradmin" -ErrorAction SilentlyContinue) {
              # Jika user sudah ada, kita cukup update password-nya
              Set-LocalUser -Name "runneradmin" -Password $Password
          } else {
              # Jika belum ada, baru kita buat baru
              New-LocalUser -Name "runneradmin" -Password $Password -Description "RDP User"
          }
          # Pastikan user masuk ke group Remote Desktop & Admin (abaikan jika sudah ada di group)
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "runneradmin" -ErrorAction SilentlyContinue

      - name: Setup Cloudflare Tunnel
        run: |
          curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          ./cloudflared.exe tunnel run --token ${{ secrets.CF_TOKEN }}
